<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Dota 2 Heroes</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- ПРОВЕРКА СЕССИИ ПРИ ЗАГРУЗКЕ -->
  <script>
    (function() {
      const currentUser = localStorage.getItem('currentUser');
      
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }
      
      try {
        const user = JSON.parse(currentUser);
        if (!user.isLoggedIn) {
          window.location.href = 'login.html';
          return;
        }
        console.log('👋 Добро пожаловать, ' + user.name + '!');
      } catch (e) {
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
      }
    })();
  </script>
  
</head>
<body>

<div class="bg-gradient"></div>

<div class="container">
  <header class="header">
    <div class="header-left">
      <h1>🎮 DOTA 2</h1>
      <p>HEROES <span class="rank-badge">&lt; 7k MMR</span></p>
    </div>
    <div class="header-right">
      <div class="search-box">
        <input type="text" id="heroSearch" placeholder="🔍 Поиск героя...">
      </div>
      
      <div class="user-info" id="userInfo" style="display: none;">
        <span class="user-name" id="userNameDisplay"></span>
        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
      </div>
      
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="carry">Carry</button>
        <button class="filter-btn" data-filter="mid">Mid</button>
        <button class="filter-btn" data-filter="offlane">Offlane</button>
        <button class="filter-btn" data-filter="support">Support</button>
      </div>
    </div>
  </header>

  <div class="heroes-grid" id="heroesGrid">
    <!-- Герои будут вставлены через JS -->
  </div>

  <!-- Модальное окно с гайдом -->
  <div class="modal-overlay" id="heroModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-hero-icon" id="modalIcon">⚔️</div>
          <div>
            <h2 id="modalName">Pudge</h2>
            <span class="modal-role" id="modalRole">Mid</span>
          </div>
          <div class="modal-winrate">
  
    
</div>
        
        <div class="modal-body">
          <!-- СЕКЦИЯ СТАТИСТИКИ -->
          <div class="stats-section" id="statsSection">
            <h3>📊 Ваша статистика</h3>
            <div class="stats-grid">
              <div class="stat-item">
                <span class="stat-label">Всего игр</span>
                <span class="stat-value" id="statGames">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Побед</span>
                <span class="stat-value win" id="statWins">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Поражений</span>
                <span class="stat-value loss" id="statLosses">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Винрейт</span>
                <span class="stat-value" id="statWinrate">0%</span>
              </div>
            </div>
          </div>

          <!-- ИМПОРТ ИЗ OPENDOTA -->
          <!-- ИМПОРТ ИЗ OPENDOTA -->
<div class="import-section">
    <h3>🔌 Импорт из OpenDota</h3>
    <div class="import-controls">
        <input type="text" id="openDotaAccountId" placeholder="Введите Steam ID" class="import-input" value="1061233158">
        <button onclick="quickSearchById()" class="import-btn search-btn">⚡ Проверить ID</button>
        <button onclick="quickImport()" class="import-btn import-btn-primary">📥 Быстрый импорт</button>
        <button onclick="searchPlayerOpenDotaUI()" class="import-btn" style="background:rgba(255,255,255,0.05);color:#8aacbc;border:1px solid rgba(255,255,255,0.05);">🔍 Поиск по никнейму</button>
    </div>
    <div id="searchResults" class="search-results" style="display: none;"></div>
    <div id="importStatus" class="import-status"></div>
    <div class="import-hint">
        <small>ℹ️ Для быстрого импорта введите ID и нажмите "Быстрый импорт". Поиск по никнейму может быть медленным.</small>
    </div>
</div>


          <!-- РУЧНОЙ ВВОД СТАТИСТИКИ -->
          <div class="manual-input-section">
            <h3>✏️ Ручной ввод</h3>
            <div class="manual-controls">
              <div class="input-group">
                <label>Игр сыграно</label>
                <input type="number" id="manualGames" min="0" value="0" class="manual-input">
              </div>
              <div class="input-group">
                <label>Побед</label>
                <input type="number" id="manualWins" min="0" value="0" class="manual-input">
              </div>
              <button onclick="saveManualStats()" class="import-btn import-btn-primary">💾 Сохранить</button>
              <button onclick="resetHeroStats()" class="import-btn reset-btn">🔄 Сбросить</button>
            </div>
            <div id="manualStatus" class="manual-status"></div>
          </div>
          <!-- В модалке, рядом с винрейтом -->
<div class="modal-winrate">
    <span class="winrate-label" id="modalWinrateLabel">Средний винрейт &lt;7k</span>
    <span class="winrate-value" id="modalWinrate">52.3%</span>
    <button onclick="updateSingleHeroWinrate(selectedHeroId)" style="
        background: rgba(0,180,200,0.1);
        color: #00b4c8;
        border: 1px solid rgba(0,180,200,0.15);
        padding: 2px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 10px;
        margin-top: 4px;
    ">🔄 Обновить</button>
</div>

          <div class="builds-section">
            <h3>📦 Сборки</h3>
            <div class="build-tabs">
              <button class="build-tab active" data-build="core">Core</button>
              <button class="build-tab" data-build="situational">Ситуационные</button>
              <button class="build-tab" data-build="luxury">Лакшери</button>
            </div>
            <div class="build-items" id="buildItems">
              <!-- Сборки будут вставлены через JS -->
            </div>
          </div>

          <div class="skills-section">
            <h3>🎯 Скиллы</h3>
            <div class="skill-order" id="skillOrder">
              <!-- Скиллы будут вставлены через JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
